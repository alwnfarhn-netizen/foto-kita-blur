<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Pemeliharaan - Foto Kita Blur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=9">
    <style>
        .maintenance-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .maintenance-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 500px;
            text-align: center;
            animation: floatUp 0.8s ease-out;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #fff0f2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 25px rgba(230, 57, 70, 0.2);
            animation: pulseIcon 2s infinite;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: #e63946;
        }

        .maintenance-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .maintenance-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 30px;
        }

        .maintenance-text strong {
            color: #e63946;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7);
            animation: pulseStatus 1.5s infinite;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(230, 57, 70, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(230, 57, 70, 0.3); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(230, 57, 70, 0.2); }
        }

        @keyframes pulseStatus {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <div class="maintenance-card">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            
            <h1 class="maintenance-title">Sedang Dalam Pembaruan</h1>
            
            <p class="maintenance-text">
                Mohon maaf atas ketidaknyamanannya. <strong>Foto Kita Blur</strong> saat ini sedang dalam tahap pemeliharaan sistem untuk meningkatkan fitur dan memberikan pengalaman yang lebih baik. Silakan kembali beberapa saat lagi!
            </p>

            <div class="status-badge">
                <span class="status-dot"></span>
                Sistem sedang diupdate...
            </div>
        </div>
    </div>
</body>
</html>
