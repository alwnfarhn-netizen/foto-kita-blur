<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Definisi Warna
       Coklat Tua: #3D2314
       Coklat Muda/Krem: #BA8454
  -->
  <defs>
    <!-- Filter untuk sedikit bayangan agar elegan (Opsional) -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <g transform="translate(40, 30)">
    <!-- ===== BARIS PERTAMA: F O K U ===== -->
    
    <!-- Huruf F -->
    <path d="M 0,0 L 40,0 L 40,15 L 15,15 L 15,35 L 35,35 L 35,50 L 15,50 L 15,70 L 0,70 Z" fill="#3D2314" />

    <!-- Huruf O (Ikon Kamera Fokus Atas - Warna Terang) -->
    <g transform="translate(50, 0)">
      <!-- Sudut Bingkai Fokus Kiri Atas -->
      <path d="M 10,0 L 0,0 L 0,10 L 5,10 L 5,5 L 10,5 Z" fill="#BA8454" />
      <!-- Sudut Bingkai Fokus Kanan Atas -->
      <path d="M 60,0 L 70,0 L 70,10 L 65,10 L 65,5 L 60,5 Z" fill="#BA8454" />
      
      <!-- Lingkaran 'O' -->
      <circle cx="35" cy="35" r="22" fill="none" stroke="#BA8454" stroke-width="12" />
    </g>

    <!-- Huruf K -->
    <path d="M 140,0 L 155,0 L 155,30 L 175,0 L 195,0 L 170,35 L 195,70 L 175,70 L 155,40 L 155,70 L 140,70 Z" fill="#3D2314" />

    <!-- Huruf U -->
    <path d="M 205,0 L 220,0 L 220,45 C 220,55 225,60 235,60 C 245,60 250,55 250,45 L 250,0 L 265,0 L 265,45 C 265,65 255,75 235,75 C 215,75 205,65 205,45 Z" fill="#3D2314" />


    <!-- ===== BARIS KEDUA: F O K U ===== -->
    <g transform="translate(0, 80)">
      
      <!-- Huruf F -->
      <path d="M 0,0 L 40,0 L 40,15 L 15,15 L 15,35 L 35,35 L 35,50 L 15,50 L 15,70 L 0,70 Z" fill="#3D2314" />

      <!-- Huruf O (Ikon Kamera Fokus Bawah - Warna Gelap) -->
      <g transform="translate(50, 0)">
        <!-- Sudut Bingkai Fokus Kiri Bawah -->
        <path d="M 0,60 L 0,70 L 10,70 L 10,65 L 5,65 L 5,60 Z" fill="#3D2314" />
        <!-- Sudut Bingkai Fokus Kanan Bawah -->
        <path d="M 70,60 L 70,70 L 60,70 L 60,65 L 65,65 L 65,60 Z" fill="#3D2314" />
        
        <!-- Lingkaran 'O' -->
        <circle cx="35" cy="35" r="22" fill="none" stroke="#3D2314" stroke-width="12" />
      </g>

      <!-- Huruf K -->
      <path d="M 140,0 L 155,0 L 155,30 L 175,0 L 195,0 L 170,35 L 195,70 L 175,70 L 155,40 L 155,70 L 140,70 Z" fill="#3D2314" />

      <!-- Huruf U -->
      <path d="M 205,0 L 220,0 L 220,45 C 220,55 225,60 235,60 C 245,60 250,55 250,45 L 250,0 L 265,0 L 265,45 C 265,65 255,75 235,75 C 215,75 205,65 205,45 Z" fill="#3D2314" />

    </g>
  </g>
</svg>
